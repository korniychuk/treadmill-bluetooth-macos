# treadmill-bluetooth-macos — per-user config.
#
# Lives OUTSIDE this repo at ~/.config/treadmill-bluetooth-macos/config.toml
# (bring your own, e.g. symlinked from a personal dotfiles repo). Every key is
# optional; the commented lines below show the built-in default for each — copy
# a line, uncomment it, and change the value to override.
#
# Edits are hot-reloaded by the daemon within ~5s while it is connected to the
# treadmill (no restart needed).

# Daily step goals (up to 3). Each is celebrated once per day with a toast,
# graduated by rank (lowest = quietest). This is the only key most people set.
goals = [8000, 10000, 12000]

# Merge activity segments closer than this many minutes into one displayed
# workout. Read-time and retroactive — changing it re-groups history with no
# recompute.
# workout_gap_minutes = 15

# Auto-pause the belt once it has run this many minutes with nobody walking
# (you stepped off but the belt kept going). 0 disables auto-pause entirely.
# After the pause the treadmill's own built-in shutoff powers it down.
# auto_pause_minutes = 5

# Zone Hold (задача 027): closed-loop mode that auto-adjusts belt speed off a
# worn heart-rate sensor (задача 025) to hold a target heart-rate zone during
# desk walking. Off by default — turn it on with `tm zone on` (interactive
# onboarding: asks your age, writes this section) rather than hand-editing
# `enabled`/`age` here. Everything below is optional; defaults shown in
# comments. See docs/tasks/027 for the full design.
# [zone_hold]
# enabled = false          # master-switch; tm zone on/off manages this
# age = 30                 # for HRmax = 208 - 0.7*age (Tanaka formula)
# resting_hr = 70          # optional; set it to unlock the karvonen method
# method = "hrmax"         # "hrmax" (% of HRmax) | "karvonen" (% of heart-rate reserve)
# target_zone = 2          # 1-based index, OR a zone id/name string, e.g. "aerobic-base"
# min_speed = 2.0          # km/h, hard floor
# max_speed = 4.5          # km/h, global ceiling (a zone below can override it)
# tracking = "band"        # "band" (hold the whole zone) | "center" (hold the midpoint)
# warmup_minutes = 5       # linear ramp at session start, HR ignored
# correction_interval_seconds = 20
# deadband_bpm = 3         # only used by tracking = "center"
# max_step_kmh = 0.3       # max speed change per correction
# reentry_grace_seconds = 45   # no corrections for this long after returning to the belt
# safety_cap_percent = 80      # HR above this % of HRmax forces a speed reduction

# Custom zones: any number, your own names/bounds. Give each EITHER a percent
# range (interpreted per `method` above) OR an absolute bpm range (min_bpm/
# max_bpm) for manual fine-tuning. Omitted entirely -> the built-in 5 zones
# (ids: recovery/aerobic-base/tempo/threshold/vo2max). `id` is optional -- it
# defaults to a slug of `name` (e.g. "Aerobic base" -> "aerobic-base") and is
# what `target_zone`/`tm zone target` match against; set it explicitly if you
# want a shorter or more stable handle than the slugified name. Run
# `tm zone list` to see everything currently configured, ids included.
# [[zone_hold.zones]]
# id = "aerobic-base"      # optional; defaults to a slug of `name`
# name = "Aerobic base"
# min_percent = 60
# max_percent = 70
# max_speed = 5.0          # optional per-zone override of the global max_speed
